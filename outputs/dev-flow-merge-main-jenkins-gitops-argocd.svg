<svg xmlns="http://www.w3.org/2000/svg" width="1500" height="520" viewBox="0 0 1500 520" role="img" aria-labelledby="title desc">
  <title id="title">Dev Flow: main merge to Argo CD dev sync</title>
  <desc id="desc">Diagram showing merge main, Jenkins build and push image, GitOps dev values update, and Argo CD sync to dev namespace.</desc>
  <defs>
    <marker id="arrow" viewBox="0 0 12 12" refX="11" refY="6" markerWidth="12" markerHeight="12" orient="auto-start-reverse">
      <path d="M 0 0 L 12 6 L 0 12 z" fill="#2563eb"/>
    </marker>
    <filter id="shadow" x="-20%" y="-20%" width="140%" height="140%">
      <feDropShadow dx="0" dy="8" stdDeviation="7" flood-color="#0f172a" flood-opacity="0.12"/>
    </filter>
    <style>
      .page { fill: #f8fafc; }
      .title { font: 700 34px Arial, sans-serif; fill: #0f172a; }
      .subtitle { font: 400 18px Arial, sans-serif; fill: #475569; }
      .box { fill: #ffffff; stroke: #cbd5e1; stroke-width: 2; rx: 18; filter: url(#shadow); }
      .devbox { fill: #ecfeff; stroke: #06b6d4; stroke-width: 2.5; rx: 18; filter: url(#shadow); }
      .icon { font: 700 24px Arial, sans-serif; fill: #ffffff; }
      .box-title { font: 700 23px Arial, sans-serif; fill: #0f172a; }
      .body { font: 400 16px Arial, sans-serif; fill: #334155; }
      .small { font: 600 14px Arial, sans-serif; fill: #475569; }
      .arrow { stroke: #2563eb; stroke-width: 4; fill: none; marker-end: url(#arrow); }
      .label { font: 700 15px Arial, sans-serif; fill: #1e293b; }
      .badge { fill: #2563eb; }
      .badge-text { font: 700 14px Arial, sans-serif; fill: #ffffff; }
    </style>
  </defs>

  <rect class="page" width="1500" height="520"/>
  <text class="title" x="64" y="62">Luồng Dev: Merge main -> Jenkins -> GitOps -> Argo CD -> namespace dev</text>
  <text class="subtitle" x="64" y="94">Khi code được merge vào main, Jenkins cập nhật image tag commit SHA vào GitOps repo; Argo CD tự động sync vào môi trường dev.</text>

  <!-- Step 1 -->
  <rect class="box" x="64" y="172" width="185" height="170"/>
  <circle class="badge" cx="96" cy="205" r="18"/>
  <text class="badge-text" x="96" y="211" text-anchor="middle">1</text>
  <circle cx="128" cy="254" r="28" fill="#111827"/>
  <text class="icon" x="128" y="263" text-anchor="middle">GH</text>
  <text class="box-title" x="86" y="307">Merge main</text>
  <text class="body" x="88" y="334">YAS source repo</text>

  <!-- Step 2 -->
  <rect class="box" x="316" y="150" width="230" height="215"/>
  <circle class="badge" cx="348" cy="183" r="18"/>
  <text class="badge-text" x="348" y="189" text-anchor="middle">2</text>
  <circle cx="385" cy="224" r="28" fill="#ef4444"/>
  <text class="icon" x="385" y="233" text-anchor="middle">J</text>
  <text class="box-title" x="430" y="219">Jenkins</text>
  <text class="body" x="348" y="277">Detect service thay đổi</text>
  <text class="body" x="348" y="306">Build/test service</text>
  <text class="body" x="348" y="335">Tạo image tag commit SHA</text>

  <!-- Step 3 Docker -->
  <rect class="box" x="618" y="95" width="245" height="150"/>
  <circle class="badge" cx="650" cy="128" r="18"/>
  <text class="badge-text" x="650" y="134" text-anchor="middle">3</text>
  <circle cx="690" cy="170" r="28" fill="#0ea5e9"/>
  <text class="icon" x="690" y="179" text-anchor="middle">DH</text>
  <text class="box-title" x="735" y="164">Docker Hub</text>
  <text class="body" x="650" y="213">Push image:</text>
  <text class="small" x="744" y="213">&lt;service&gt;:&lt;commit-sha&gt;</text>

  <!-- Step 4 GitOps -->
  <rect class="box" x="618" y="300" width="280" height="160"/>
  <circle class="badge" cx="650" cy="333" r="18"/>
  <text class="badge-text" x="650" y="339" text-anchor="middle">4</text>
  <circle cx="690" cy="378" r="28" fill="#7c3aed"/>
  <text class="icon" x="690" y="387" text-anchor="middle">Git</text>
  <text class="box-title" x="735" y="371">GitOps repo</text>
  <text class="body" x="650" y="421">Update:</text>
  <text class="small" x="713" y="421">envs/dev/&lt;service&gt;-values.yaml</text>
  <text class="small" x="713" y="448">tag: &lt;commit-sha&gt;</text>

  <!-- Step 5 Argo -->
  <rect class="box" x="990" y="240" width="210" height="165"/>
  <circle class="badge" cx="1022" cy="273" r="18"/>
  <text class="badge-text" x="1022" y="279" text-anchor="middle">5</text>
  <circle cx="1060" cy="318" r="28" fill="#f97316"/>
  <text class="icon" x="1060" y="327" text-anchor="middle">Ar</text>
  <text class="box-title" x="1100" y="310">Argo CD</text>
  <text class="body" x="1022" y="360">Watch GitOps repo</text>
  <text class="body" x="1022" y="389">Auto sync enabled</text>

  <!-- Step 6 dev namespace -->
  <rect class="devbox" x="1270" y="215" width="180" height="215"/>
  <circle class="badge" cx="1302" cy="248" r="18"/>
  <text class="badge-text" x="1302" y="254" text-anchor="middle">6</text>
  <circle cx="1340" cy="295" r="28" fill="#06b6d4"/>
  <text class="icon" x="1340" y="304" text-anchor="middle">dev</text>
  <text class="box-title" x="1306" y="350">Namespace dev</text>
  <text class="body" x="1305" y="382">Deployment rollout</text>
  <text class="body" x="1305" y="411">Pod pull image mới</text>

  <!-- Arrows -->
  <path class="arrow" d="M 249 257 C 278 257, 288 257, 316 257"/>
  <text class="label" x="263" y="238">trigger</text>

  <path class="arrow" d="M 546 215 C 576 185, 588 170, 618 170"/>
  <text class="label" x="553" y="174">push image</text>

  <path class="arrow" d="M 546 320 C 578 350, 590 380, 618 380"/>
  <text class="label" x="552" y="365">commit values</text>

  <path class="arrow" d="M 898 380 C 940 380, 950 322, 990 322"/>
  <text class="label" x="918" y="352">watch</text>

  <path class="arrow" d="M 1200 322 C 1230 322, 1240 322, 1270 322"/>
  <text class="label" x="1210" y="302">sync</text>

  <path class="arrow" d="M 864 168 C 980 140, 1180 142, 1338 215"/>
  <text class="label" x="1010" y="130">K3s pull image từ Docker Hub khi rollout</text>

  <rect x="64" y="455" width="1386" height="40" rx="14" fill="#e2e8f0" stroke="#cbd5e1"/>
  <text class="small" x="90" y="481">Kết quả: service bị thay đổi trên main được deploy tự động vào namespace dev với image tag commit SHA mới nhất.</text>
</svg>
