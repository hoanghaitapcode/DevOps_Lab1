<svg xmlns="http://www.w3.org/2000/svg" width="1500" height="760" viewBox="0 0 1500 760" role="img" aria-labelledby="title desc">
  <title id="title">YAS Observability Flow</title>
  <desc id="desc">Observability data flow showing metrics to Prometheus, logs to Loki, traces to Tempo, all viewed in Grafana.</desc>
  <defs>
    <marker id="arrow-metrics" viewBox="0 0 12 12" refX="11" refY="6" markerWidth="12" markerHeight="12" orient="auto-start-reverse">
      <path d="M 0 0 L 12 6 L 0 12 z" fill="#2563eb"/>
    </marker>
    <marker id="arrow-logs" viewBox="0 0 12 12" refX="11" refY="6" markerWidth="12" markerHeight="12" orient="auto-start-reverse">
      <path d="M 0 0 L 12 6 L 0 12 z" fill="#16a34a"/>
    </marker>
    <marker id="arrow-traces" viewBox="0 0 12 12" refX="11" refY="6" markerWidth="12" markerHeight="12" orient="auto-start-reverse">
      <path d="M 0 0 L 12 6 L 0 12 z" fill="#7c3aed"/>
    </marker>
    <filter id="shadow" x="-20%" y="-20%" width="140%" height="140%">
      <feDropShadow dx="0" dy="8" stdDeviation="8" flood-color="#0f172a" flood-opacity="0.12"/>
    </filter>
    <style>
      .page { fill: #f8fafc; }
      .title { font: 700 34px Arial, sans-serif; fill: #0f172a; }
      .subtitle { font: 400 18px Arial, sans-serif; fill: #475569; }
      .box { fill: #ffffff; stroke: #cbd5e1; stroke-width: 2; rx: 18; filter: url(#shadow); }
      .grafana { fill: #fff7ed; stroke: #f97316; stroke-width: 3; rx: 22; filter: url(#shadow); }
      .lane-metrics { fill: #eff6ff; stroke: #bfdbfe; stroke-width: 1.5; rx: 20; }
      .lane-logs { fill: #f0fdf4; stroke: #bbf7d0; stroke-width: 1.5; rx: 20; }
      .lane-traces { fill: #f5f3ff; stroke: #ddd6fe; stroke-width: 1.5; rx: 20; }
      .lane-label { font: 700 17px Arial, sans-serif; fill: #1e293b; }
      .box-title { font: 700 23px Arial, sans-serif; fill: #0f172a; }
      .body { font: 400 16px Arial, sans-serif; fill: #334155; }
      .small { font: 600 14px Arial, sans-serif; fill: #475569; }
      .icon { font: 700 25px Arial, sans-serif; fill: #ffffff; }
      .arrow-metrics { stroke: #2563eb; stroke-width: 4; fill: none; marker-end: url(#arrow-metrics); }
      .arrow-logs { stroke: #16a34a; stroke-width: 4; fill: none; marker-end: url(#arrow-logs); }
      .arrow-traces { stroke: #7c3aed; stroke-width: 4; fill: none; marker-end: url(#arrow-traces); }
      .caption { font: 700 14px Arial, sans-serif; fill: #334155; }
    </style>
  </defs>

  <rect class="page" width="1500" height="760"/>
  <text class="title" x="64" y="62">Luồng Observability của YAS</text>
  <text class="subtitle" x="64" y="94">Metrics, logs và traces được thu thập bởi các thành phần riêng, sau đó quan sát tập trung trong Grafana.</text>

  <!-- Lanes -->
  <rect class="lane-metrics" x="64" y="135" width="1120" height="150"/>
  <text class="lane-label" x="88" y="166">Metrics</text>

  <rect class="lane-logs" x="64" y="320" width="1120" height="150"/>
  <text class="lane-label" x="88" y="351">Logs</text>

  <rect class="lane-traces" x="64" y="505" width="1120" height="150"/>
  <text class="lane-label" x="88" y="536">Traces</text>

  <!-- Metrics boxes -->
  <rect class="box" x="175" y="170" width="245" height="85"/>
  <circle cx="212" cy="212" r="25" fill="#2563eb"/>
  <text class="icon" x="212" y="221" text-anchor="middle">K8s</text>
  <text class="box-title" x="252" y="205">Kubernetes</text>
  <text class="small" x="252" y="230">workloads / nodes / pods</text>

  <rect class="box" x="570" y="170" width="230" height="85"/>
  <circle cx="607" cy="212" r="25" fill="#ef4444"/>
  <text class="icon" x="607" y="221" text-anchor="middle">P</text>
  <text class="box-title" x="647" y="205">Prometheus</text>
  <text class="small" x="647" y="230">scrape metrics</text>

  <!-- Logs boxes -->
  <rect class="box" x="175" y="355" width="245" height="85"/>
  <circle cx="212" cy="397" r="25" fill="#0f172a"/>
  <text class="icon" x="212" y="406" text-anchor="middle">log</text>
  <text class="box-title" x="252" y="390">Pod logs</text>
  <text class="small" x="252" y="415">stdout / stderr</text>

  <rect class="box" x="530" y="355" width="210" height="85"/>
  <circle cx="567" cy="397" r="25" fill="#16a34a"/>
  <text class="icon" x="567" y="406" text-anchor="middle">PT</text>
  <text class="box-title" x="607" y="390">Promtail</text>
  <text class="small" x="607" y="415">collect logs</text>

  <rect class="box" x="850" y="355" width="190" height="85"/>
  <circle cx="887" cy="397" r="25" fill="#22c55e"/>
  <text class="icon" x="887" y="406" text-anchor="middle">L</text>
  <text class="box-title" x="927" y="390">Loki</text>
  <text class="small" x="927" y="415">store logs</text>

  <!-- Traces boxes -->
  <rect class="box" x="175" y="540" width="245" height="85"/>
  <circle cx="212" cy="582" r="25" fill="#6366f1"/>
  <text class="icon" x="212" y="591" text-anchor="middle">TG</text>
  <text class="box-title" x="252" y="575">telemetrygen</text>
  <text class="small" x="252" y="600">OTLP trace generator</text>

  <rect class="box" x="510" y="540" width="285" height="85"/>
  <circle cx="547" cy="582" r="25" fill="#7c3aed"/>
  <text class="icon" x="547" y="591" text-anchor="middle">OT</text>
  <text class="box-title" x="587" y="575">OpenTelemetry</text>
  <text class="small" x="587" y="600">Collector receives OTLP</text>

  <rect class="box" x="850" y="540" width="190" height="85"/>
  <circle cx="887" cy="582" r="25" fill="#8b5cf6"/>
  <text class="icon" x="887" y="591" text-anchor="middle">T</text>
  <text class="box-title" x="927" y="575">Tempo</text>
  <text class="small" x="927" y="600">store traces</text>

  <!-- Grafana -->
  <rect class="grafana" x="1240" y="255" width="210" height="245"/>
  <circle cx="1345" cy="315" r="34" fill="#f97316"/>
  <text class="icon" x="1345" y="325" text-anchor="middle" font-size="31">G</text>
  <text class="box-title" x="1298" y="378">Grafana</text>
  <text class="body" x="1284" y="410">Explore metrics</text>
  <text class="body" x="1284" y="438">Explore logs</text>
  <text class="body" x="1284" y="466">Explore traces</text>

  <!-- Arrows -->
  <path class="arrow-metrics" d="M 420 212 C 470 212, 515 212, 570 212"/>
  <text class="caption" x="452" y="196">scrape</text>

  <path class="arrow-metrics" d="M 800 212 C 1020 200, 1150 238, 1240 315"/>
  <text class="caption" x="1035" y="196">datasource</text>

  <path class="arrow-logs" d="M 420 397 C 458 397, 492 397, 530 397"/>
  <text class="caption" x="448" y="381">read files</text>

  <path class="arrow-logs" d="M 740 397 C 780 397, 812 397, 850 397"/>
  <text class="caption" x="760" y="381">push logs</text>

  <path class="arrow-logs" d="M 1040 397 C 1115 397, 1168 397, 1240 397"/>
  <text class="caption" x="1092" y="381">datasource</text>

  <path class="arrow-traces" d="M 420 582 C 452 582, 478 582, 510 582"/>
  <text class="caption" x="437" y="566">OTLP</text>

  <path class="arrow-traces" d="M 795 582 C 815 582, 830 582, 850 582"/>
  <text class="caption" x="792" y="566">export</text>

  <path class="arrow-traces" d="M 1040 582 C 1124 570, 1178 506, 1240 470"/>
  <text class="caption" x="1090" y="552">datasource</text>

  <!-- Bottom note -->
  <rect x="64" y="690" width="1386" height="46" rx="16" fill="#e2e8f0" stroke="#cbd5e1"/>
  <text class="small" x="92" y="719">Kết quả kiểm thử: Prometheus query `up`, Loki query `{namespace="staging"}`, Tempo query `{resource.service.name="telemetrygen"}` đều có dữ liệu trong Grafana.</text>
</svg>
