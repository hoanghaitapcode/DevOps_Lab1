apiVersion: argoproj.io/v1alpha1
kind: Application
metadata:
  name: yas-root-staging
  namespace: argocd
spec:
  project: default
  source:
    repoURL: https://github.com/DoubleHo05/yas-deployment.git
    targetRevision: main
    path: apps/staging
  destination:
    server: https://kubernetes.default.svc
    namespace: argocd
  syncPolicy:
    automated:
      prune: true
      selfHeal: true
